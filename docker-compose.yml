name: obscyra
services:
    server:
        image: ghcr.io/rkd-sh64/obscyra:latest
        container_name: obscyra
        env_file:
            - .env.server
        ports:
            - '8080:8080'
        networks:
            - obscyra-net

    web:
        build:
            context: .
            dockerfile: Dockerfile
            target: development
        env_file:
            - .env.web
        ports:
            - '5173:5173'
        volumes:
            - .:/app
            - /app/node_modules
        depends_on:
            - server
        networks:
            - obscyra-net

networks:
    obscyra-net:
